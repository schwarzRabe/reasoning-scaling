lora:
  rank: 64
  alpha: 128
  target_modules: [q_proj, k_proj, v_proj, o_proj]

training:
  lr: 2e-4
  num_epochs: 3
  batch_size: 4
  gradient_accumulation: 4
  max_seq_length: 8192
  warmup_ratio: 0.05

# 4 volume * 3 cot_length * 3 seed = 36 прогонов
grid:
  volumes: [500, 1000, 2000, 5000]
  cot_lengths: [2048, 4096, 8192]
  seeds: [42, 123, 456]
